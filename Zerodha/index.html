<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerodha - Online stock trading at lowest prices from India</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- Importing a clean, modern font similar to Zerodha's -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Semantic Header and Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo-link">
                <img class="logo" src="https://zerodha.com/static/images/logo.svg" alt="Zerodha Logo">
            </a>
            
            <nav class="nav-links">
                <ul>
                    <li><a href="https://zerodha.com/open-account/">Signup</a></li>
                    <li><a href="https://zerodha.com/about/">About</a></li>
                    <li><a href="https://zerodha.com/product/">Product</a></li>
                    <li><a href="https://zerodha.com/pricing/">Pricing</a></li>
                    <li><a href="https://zerodha.com/support/">Support</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Semantic Main Content Area -->
    <main class="hero-section">
        <div class="hero-image-container">
            <img class="hero-image" src="https://zerodha.com/static/images/landing.png" alt="Zerodha platform mockups">
        </div>

        <div class="hero-content">
            <h1>Invest in everything</h1>
            <h2>Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.</h2>
            
            <!-- Use anchor tags for calls to action, not divs -->
            <a href="#" class="btn-primary">Sign up now</a>
        </div>
    </main>

</body>
</html>
